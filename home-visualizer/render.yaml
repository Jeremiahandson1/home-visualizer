# ═══════════════════════════════════════════════════
# Render Blueprint — HomeVisualizer
# Deploy: connect GitHub repo → Render auto-detects this file
# ═══════════════════════════════════════════════════

services:
  - type: web
    name: home-visualizer
    runtime: node
    plan: starter  # $7/mo — upgrade to standard ($25) for production
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_BASE_URL
        sync: false  # Set manually: https://home-visualizer.onrender.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: STRIPE_PRICE_LICENSE_STARTER
        sync: false
      - key: STRIPE_PRICE_LICENSE_PRO
        sync: false
      - key: STRIPE_PRICE_LICENSE_AGENCY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
